name: Build and Release_local

on:
  workflow_dispatch:
    inputs:
      version:
        description: "リリースするバージョン（例: v1.0.0）"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Windows固有のターゲットを許可するフラグを追加
      - name: Restore
        run: dotnet restore src/FileLock.csproj -p:EnableWindowsTargeting=true

      # ここにも同様にフラグを追加
      - name: Publish (self-contained single exe)
        run: >
          dotnet publish src/FileLock.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ github.event.inputs.version }}
          -p:EnableWindowsTargeting=true
          -o publish

      - name: Build installer (Inno Setup via Wine)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            amake/innosetup:latest \
            iscc \
            /DMyAppVersion=${{ github.event.inputs.version }} \
            installer/setup.iss

      - name: Create GitHub Release（アーティファクトは出さず直接リリース）
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: FileLock ${{ github.event.inputs.version }}
          files: installer/Output/FileLock-Setup-${{ github.event.inputs.version }}.exe
