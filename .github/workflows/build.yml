name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "リリースするバージョン（例: v1.0.0）"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/FileLock.csproj

      - name: Resolve version numbers
        id: ver
        shell: pwsh
        run: |
          # タグ名（例: v1.0.0）と、MSBuildのVersionプロパティ用の数値のみのバージョン（例: 1.0.0）を分ける
          $tag = "${{ github.event.inputs.version }}"
          $numeric = $tag.TrimStart("v", "V")
          if ($numeric -notmatch '^\d+(\.\d+){0,3}$') {
            # 想定外の形式(例: v1.0-beta)の場合は先頭の数値部分だけを拾い、それ以外は0.0.1にフォールバック
            if ($numeric -match '^\d+(\.\d+){0,3}') {
              $numeric = $Matches[0]
            } else {
              $numeric = "0.0.1"
            }
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "numeric=$numeric" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained single exe)
        run: >
          dotnet publish src/FileLock.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.numeric }}
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer (バージョンをファイル名に反映)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.numeric }}" `
            installer\setup.iss

      - name: Create GitHub Release（アーティファクトは出さず直接リリース）
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: FileLock ${{ steps.ver.outputs.tag }}
          files: installer/Output/FileLock-Setup-${{ steps.ver.outputs.numeric }}.exe
